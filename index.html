<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta http-equiv='refresh' content='300'>
    <title>Infrastructure Services Status</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --card-border: rgba(255, 255, 255, 0.1);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --green-color: #10b981;
        --red-color: #ef4444;
        --yellow-color: #f59e0b;
        --blue-color: #3b82f6;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        background-image: 
            radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
            radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
            radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
        color: var(--text-main);
        min-height: 100vh;
        padding: 2rem;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--card-border);
    }

    h1 {
        font-size: 2rem;
        font-weight: 700;
        background: linear-gradient(to right, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .meta-info {
        text-align: right;
        font-size: 0.875rem;
        color: var(--text-muted);
    }

    .last-updated {
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 0.25rem;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 2rem;
    }

    .host-card {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        border-radius: 1rem;
        padding: 1.5rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .host-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
    }

    .host-header {
        display: flex;
        align-items: center;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(255,255,255, 0.05);
    }

    .host-icon {
        background: rgba(59, 130, 246, 0.2);
        color: var(--blue-color);
        width: 40px;
        height: 40px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 1rem;
    }

    .host-title {
        font-size: 1.25rem;
        font-weight: 600;
    }

    .service-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .service-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        background: rgba(0,0,0, 0.25);
        border-radius: 0.5rem;
        border: 1px solid transparent;
    }

    .service-info {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
    }

    .service-name {
        font-family: monospace;
        font-size: 1rem;
        font-weight: 600;
        color: #e2e8f0;
    }
    
    .dual-indicators {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        align-items: flex-end;
    }

    .indicator-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }
    
    .indicator-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        font-weight: 600;
    }

    .status-badge {
        display: flex;
        align-items: center;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0.2rem 0.6rem;
        border-radius: 9999px;
        min-width: 90px;
        justify-content: center;
    }

    .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 0.5rem;
    }

    /* Status Colors */
    .status-active {
        background: rgba(16, 185, 129, 0.1);
        color: var(--green-color);
        border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .status-active .status-indicator {
        background-color: var(--green-color);
        box-shadow: 0 0 8px var(--green-color);
        animation: pulse-green 2s infinite;
    }

    .status-dead {
        background: rgba(239, 68, 68, 0.1);
        color: var(--red-color);
        border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .status-dead .status-indicator {
        background-color: var(--red-color);
        box-shadow: 0 0 8px var(--red-color);
        animation: pulse-red 2s infinite;
    }

    .status-unknown {
        background: rgba(245, 158, 11, 0.1);
        color: var(--yellow-color);
        border: 1px solid rgba(245, 158, 11, 0.2);
    }
    .status-unknown .status-indicator {
        background-color: var(--yellow-color);
    }
    
    .status-not_configured {
        background: transparent;
        color: var(--text-muted);
        border: 1px dashed var(--text-muted);
    }
    .status-not_configured .status-indicator {
        background-color: var(--text-muted);
    }

    @keyframes pulse-green {
        0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
        100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
</style>

</head>
<body>
    <div class='container'>
        <header>
            <h1>Infrastructure Services Status</h1>
            <div class='meta-info'>
                <div class='last-updated'>Last Updated</div>
                <div>2026-03-16 00:35:32</div>
                <div style='margin-top: 4px; font-size: 0.75rem; opacity: 0.7;'>Auto-refreshes every 5 mins</div>
            </div>
        </header>
        <div class='grid'>
            <div class='host-card'>
                <div class='host-header'>
                    <div class='host-icon'>
                        <svg width='24' height='24' fill='none' stroke='currentColor' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01'></path></svg>
                    </div>
                    <div class='host-title'>192.168.2.130</div>
                </div>
                <ul class='service-list'>
                    <li class='service-item'>
                        <div class='service-info'>
                            <span class='service-name'>sshd</span>
                        </div>
                        <div class='dual-indicators'>
                            <div class='indicator-row' title='systemd status: active'>
                                <span class='indicator-label'>System</span>
                                <span class='status-badge status-active'>
                                    <span class='status-indicator'></span>
                                    Running
                                </span>
                            </div>
                            <div class='indicator-row' title='App script status: active'>
                                <span class='indicator-label'>App</span>
                                <span class='status-badge status-active'>
                                    <span class='status-indicator'></span>
                                    Running
                                </span>
                            </div>
                        </div>
                    </li>
                    <li class='service-item'>
                        <div class='service-info'>
                            <span class='service-name'>cron</span>
                        </div>
                        <div class='dual-indicators'>
                            <div class='indicator-row' title='systemd status: inactive'>
                                <span class='indicator-label'>System</span>
                                <span class='status-badge status-dead'>
                                    <span class='status-indicator'></span>
                                    Dead
                                </span>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
